<div class="container mt-4">
    <div class="row justify-content-md-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Login</h4>
                </div>
                <div class="card-body">
 
                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                        <!-- Username Field -->
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" formControlName="username" class="form-control" 
                                   [ngClass]="{ 'is-invalid': loginForm.get('username')?.invalid && 
                                   (loginForm.get('username')?.dirty || loginForm.get('username')?.touched) }">
                            <div *ngIf="loginForm.get('username')?.invalid && 
                                   (loginForm.get('username')?.dirty || loginForm.get('username')?.touched)">
                                <div *ngFor="let error of getFormValidationErrors('username')">
                                    {{ error }}
                                </div>
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" formControlName="password" class="form-control" 
                                   [ngClass]="{ 'is-invalid': loginForm.get('password')?.invalid && 
                                   (loginForm.get('password')?.dirty || loginForm.get('password')?.touched) }">
                            <div *ngIf="loginForm.get('password')?.invalid && 
                                   (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)">
                                <div *ngFor="let error of getFormValidationErrors('password')">
                                    {{ error }}
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" 
                                    [disabled]="!loginForm.valid">
                                Login
                            </button>
                            <a routerLink="/signup" class="btn btn-link">
                                Don't have an account? Sign up
                            </a>
                                                
                        <!-- Error message display -->
                        <div *ngIf="errorMessage" class="alert alert-danger mb-3">
                            {{ errorMessage }}
                        </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
