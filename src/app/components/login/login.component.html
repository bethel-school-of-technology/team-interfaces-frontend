<div class="container mt-4">
    <div class="row justify-content-md-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h4>Login</h4>
          </div>
          <div class="card-body">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <!-- Username Field -->
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" formControlName="username" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('username') }">
                <div *ngIf="isFieldInvalid('username')">
                  <div *ngFor="let error of getFormValidationErrors('username')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <!-- Password Field -->
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" formControlName="password" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('password') }">
                <div *ngIf="isFieldInvalid('password')">
                  <div *ngFor="let error of getFormValidationErrors('password')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <!-- Error Message -->
              <div *ngIf="errorMessage" class="alert alert-danger mb-3">
                {{ errorMessage }}
              </div>
  
              

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"
                        [disabled]="!loginForm.valid || isSubmitting">
                  Login
                </button>
                
                <a routerLink="/signup" class="btn btn-link">
                  Don't have an account? Sign up
                </a>
              </div>

              <div class="d-flex gap-2">
                <button type="reset" class="btn btn-outline-secondary">
                  Reset
                </button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
