<div class="container mt-4">
  <div class="row justify-content-md-center">
      <div class="col-md-6">
          <div class="card">
              <div class="card-header">
                
                  <h4>Sign Up</h4>
              </div>
              <div class="card-body">
                  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

                      <!-- Username Field -->
                      <div class="mb-3">
                          <label class="form-label">Username</label>
                          <input type="text" formControlName="username" class="form-control" 
                                 [ngClass]="{ 'is-invalid': signupForm.get('username')?.invalid && 
                                 (signupForm.get('username')?.dirty || signupForm.get('username')?.touched) }">
                          <div *ngIf="signupForm.get('username')?.invalid && 
                                 (signupForm.get('username')?.dirty || signupForm.get('username')?.touched)">
                              <div *ngFor="let error of getFormValidationErrors('username')">
                                  {{ error }}
                              </div>
                          </div>
                      </div>

                      <!-- Password Field -->
                      <div class="mb-3">
                          <label class="form-label">Password</label>
                          <input type="password" formControlName="password" class="form-control" 
                                 [ngClass]="{ 'is-invalid': signupForm.get('password')?.invalid && 
                                 (signupForm.get('password')?.dirty || signupForm.get('password')?.touched) }">
                          <div *ngIf="signupForm.get('password')?.invalid && 
                                 (signupForm.get('password')?.dirty || signupForm.get('password')?.touched)">
                              <div *ngFor="let error of getFormValidationErrors('password')">
                                  {{ error }}
                              </div>
                          </div>
                      </div>

                      <!-- Name Field -->
                      <div class="mb-3">
                          <label class="form-label">Full Name</label>
                          <input type="text" formControlName="name" class="form-control" 
                                 [ngClass]="{ 'is-invalid': signupForm.get('name')?.invalid && 
                                 (signupForm.get('name')?.dirty || signupForm.get('name')?.touched) }">
                          <div *ngIf="signupForm.get('name')?.invalid && 
                                 (signupForm.get('name')?.dirty || signupForm.get('name')?.touched)">
                              <div *ngFor="let error of getFormValidationErrors('name')">
                                  {{ error }}
                              </div>
                          </div>
                      </div>

                      <!-- Email Field -->
                      <div class="mb-3">
                          <label class="form-label">Email</label>
                          <input type="email" formControlName="email" class="form-control" 
                                 [ngClass]="{ 'is-invalid': signupForm.get('email')?.invalid && 
                                 (signupForm.get('email')?.dirty || signupForm.get('email')?.touched) }">
                          <div *ngIf="signupForm.get('email')?.invalid && 
                                 (signupForm.get('email')?.dirty || signupForm.get('email')?.touched)">
                              <div *ngFor="let error of getFormValidationErrors('email')">
                                  {{ error }}
                              </div>
                          </div>
                      </div>

                      <!-- Bank Account Field -->
                      <div class="mb-3">
                          <label class="form-label">Bank Account Number</label>
                          <input type="text" formControlName="bankAccount" class="form-control" 
                                 [ngClass]="{ 'is-invalid': signupForm.get('bankAccount')?.invalid && 
                                 (signupForm.get('bankAccount')?.dirty || signupForm.get('bankAccount')?.touched) }">
                          <div *ngIf="signupForm.get('bankAccount')?.invalid && 
                                 (signupForm.get('bankAccount')?.dirty || signupForm.get('bankAccount')?.touched)">
                              <div *ngFor="let error of getFormValidationErrors('bankAccount')">
                                  {{ error }}
                              </div>
                          </div>
                      </div>

                      <!-- Balance Field -->
                      <div class="mb-3">
                          <label class="form-label">Initial Balance</label>
                          <input type="number" formControlName="balance" class="form-control" 
                                 [ngClass]="{ 'is-invalid': signupForm.get('balance')?.invalid && 
                                 (signupForm.get('balance')?.dirty || signupForm.get('balance')?.touched) }">
                          <div *ngIf="signupForm.get('balance')?.invalid && 
                                 (signupForm.get('balance')?.dirty || signupForm.get('balance')?.touched)">
                              <div *ngFor="let error of getFormValidationErrors('balance')">
                                  {{ error }}
                              </div>
                          </div>
                      </div>

                      <div class="d-flex gap-2">
                          <button type="submit" class="btn btn-primary" 
                                  [disabled]="!signupForm.valid">
                              Sign Up
                          </button>
                          <button type="reset" class="btn btn-outline-secondary">
                              Reset
                          </button>
                      </div>
                  </form>
              </div>
          </div>
      </div>
  </div>
</div>
