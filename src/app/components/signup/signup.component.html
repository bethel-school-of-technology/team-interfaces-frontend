<div class="container mt-4">
    <div class="row justify-content-md-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h4>Sign Up</h4>
          </div>
          <div class="card-body">
            <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
  
              <!-- Password Field -->
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" formControlName="password" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('password') }">
                <div *ngIf="isFieldInvalid('password')">
                  <div *ngFor="let error of getFormValidationErrors('password')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <!-- Name Field -->
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" formControlName="name" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('name') }">
                <div *ngIf="isFieldInvalid('name')">
                  <div *ngFor="let error of getFormValidationErrors('name')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <!-- Email Field -->
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" formControlName="email" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('email') }">
                <div *ngIf="isFieldInvalid('email')">
                  <div *ngFor="let error of getFormValidationErrors('email')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <!-- Bank Account Field -->
              <div class="mb-3">
                <label class="form-label">Bank Account Number</label>
                <input type="text" formControlName="bankAccount" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('bankAccount') }">
                <div *ngIf="isFieldInvalid('bankAccount')">
                  <div *ngFor="let error of getFormValidationErrors('bankAccount')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <!-- Balance Field -->
              <div class="mb-3">
                <label class="form-label">Initial Balance</label>
                <input type="number" formControlName="balance" class="form-control"
                       [ngClass]="{ 'is-invalid': isFieldInvalid('balance') }">
                <div *ngIf="isFieldInvalid('balance')">
                  <div *ngFor="let error of getFormValidationErrors('balance')" 
                       class="invalid-feedback">
                    {{ error }}
                  </div>
                </div>
              </div>
  
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"
                        [disabled]="!signupForm.valid">
                  Sign Up
                </button>
                <button type="reset" class="btn btn-outline-secondary">
                  Reset
                </button>
                <a routerLink="/login" class="btn btn-link">
                  Already have an account? Login
                </a>
              
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
